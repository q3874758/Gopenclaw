<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Gopenclaw WebChat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050816;
        color: #e5e7eb;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        padding: 10px 16px;
        border-bottom: 1px solid #1f2933;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #020617;
      }
      header h1 {
        margin: 0;
        font-size: 16px;
      }
      header span {
        font-size: 12px;
        color: #9ca3af;
      }
      #log {
        flex: 1;
        padding: 12px 16px;
        overflow-y: auto;
        font-size: 14px;
      }
      .msg {
        margin-bottom: 8px;
        line-height: 1.4;
      }
      .msg-user {
        color: #bfdbfe;
      }
      .msg-assistant {
        color: #bbf7d0;
      }
      .msg-system {
        color: #9ca3af;
        font-size: 12px;
      }
      footer {
        padding: 8px 10px;
        border-top: 1px solid #1f2933;
        background: #020617;
        display: flex;
        gap: 8px;
      }
      textarea {
        flex: 1;
        resize: none;
        min-height: 46px;
        max-height: 120px;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #374151;
        background: #020617;
        color: #e5e7eb;
        font-size: 14px;
      }
      textarea:focus {
        outline: none;
        border-color: #3b82f6;
      }
      button {
        padding: 0 16px;
        border-radius: 6px;
        border: none;
        background: #3b82f6;
        color: white;
        font-size: 14px;
        cursor: pointer;
        white-space: nowrap;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Gopenclaw WebChat</h1>
      <span id="status">未连接</span>
    </header>
    <div id="log"></div>
    <footer>
      <textarea id="input" placeholder="对 Gopenclaw 说点什么，回车发送…"></textarea>
      <button id="send">发送</button>
    </footer>
    <script>
      const statusEl = document.getElementById("status");
      const logEl = document.getElementById("log");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("send");

      function append(type, text) {
        const div = document.createElement("div");
        div.className = "msg " + type;
        div.textContent = text;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
      }

      let ws;

      function connect() {
        const proto = location.protocol === "https:" ? "wss" : "ws";
        const url = proto + "://" + location.host + "/ws";
        ws = new WebSocket(url);
        statusEl.textContent = "连接中…";

        ws.onopen = () => {
          statusEl.textContent = "已连接";
          append("msg-system", "已连接到 " + url);
        };

        ws.onclose = () => {
          statusEl.textContent = "已断开";
          append("msg-system", "连接已关闭");
        };

        ws.onerror = (e) => {
          append("msg-system", "WebSocket 错误");
        };

        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.error) {
              append("msg-system", "错误: " + msg.error.message);
              return;
            }
            if (msg.result && msg.result.chunk) {
              append("msg-assistant", msg.result.chunk);
            } else if (msg.result && msg.result.text) {
              append("msg-assistant", msg.result.text);
            } else {
              append("msg-system", event.data);
            }
          } catch {
            append("msg-system", event.data);
          }
        };
      }

      function sendCurrent() {
        const text = inputEl.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
        inputEl.value = "";
        append("msg-user", text);
        const msg = {
          id: Date.now(),
          method: "agent.invoke",
          params: { message: text, stream: true },
        };
        ws.send(JSON.stringify(msg));
      }

      sendBtn.addEventListener("click", sendCurrent);
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendCurrent();
        }
      });

      connect();
    </script>
  </body>
  </html>
